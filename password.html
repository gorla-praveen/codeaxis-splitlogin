<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --primary:#4F46E5;
      --success:#22C55E;
      --danger:#EF4444;
      --bg:#F9FAFB;
      --text:#111827;
      --muted:#6B7280;
      --border:#E5E7EB;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter', sans-serif;
      background:var(--bg);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .forgot-wrapper{
      width:100%;
      max-width:500px;
      background:#fff;
      border-radius:20px;
      padding:50px 40px;
      box-shadow:var(--shadow);
    }

    .icon-box{
      width:80px;
      height:80px;
      margin:auto;
      border-radius:20px;
      background:rgba(79,70,229,0.1);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:25px;
    }

    .icon-box i{
      font-size:36px;
      color:var(--primary);
    }

    .title{
      text-align:center;
      font-size:34px;
      font-weight:700;
      color:var(--text);
      font-family:'Poppins', sans-serif;
      margin-bottom:12px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      margin-bottom:35px;
      line-height:1.7;
      font-size:15px;
    }

    .form-label{
      font-weight:600;
      margin-bottom:8px;
      color:var(--text);
    }

    .form-control{
      height:56px;
      border-radius:12px;
      border:1px solid var(--border);
      padding-left:18px;
      font-size:15px;
      transition:0.3s;
    }

    .form-control:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(79,70,229,0.10);
    }

    .reset-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      font-size:16px;
      font-weight:600;
      margin-top:25px;
      transition:0.3s;
      box-shadow:0 8px 20px rgba(79,70,229,0.25);
    }

    .reset-btn:hover{
      background:#4338CA;
      transform:translateY(-2px);
    }

    .message{
      text-align:center;
      margin-top:18px;
      font-weight:600;
      font-size:14px;
      display:none;
    }

    .back-login{
      text-align:center;
      margin-top:28px;
    }

    .back-login a{
      text-decoration:none;
      color:var(--primary);
      font-weight:600;
      transition:0.3s;
    }

    .back-login a:hover{
      opacity:0.8;
    }

    @media(max-width:576px){

      .forgot-wrapper{
        padding:40px 25px;
      }

      .title{
        font-size:28px;
      }

    }

  </style>
</head>

<body>

<div class="forgot-wrapper">

  <!-- ICON -->

  <div class="icon-box">
    <i class="bi bi-shield-lock"></i>
  </div>

  <!-- TITLE -->

  <h1 class="title">
    Forgot Password?
  </h1>

  <p class="subtitle">
    No worries! Enter your registered email address and we’ll send you a password reset link.
  </p>

  <!-- FORM -->

  <form id="forgotForm">

    <div class="mb-3">

      <label class="form-label">
        Email Address
      </label>

      <input 
        type="email"
        class="form-control"
        id="email"
        placeholder="Enter your email"
        required
      >

    </div>

    <button type="submit" class="reset-btn">
      Send Reset Link
    </button>

    <!-- MESSAGE -->

    <div class="message" id="messageBox"></div>

  </form>

  <!-- BACK -->

  <div class="back-login">

    <a href="index.html">
      <i class="bi bi-arrow-left"></i>
      Back to Login
    </a>

  </div>

</div>

<!-- JAVASCRIPT -->

<script>

  const forgotForm = document.getElementById("forgotForm");
  const messageBox = document.getElementById("messageBox");
  const email = document.getElementById("email");

  forgotForm.addEventListener("submit", function(e){

    e.preventDefault();

    const emailValue = email.value.trim();

    // EMAIL VALIDATION

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(!emailValue.match(emailPattern)){

      messageBox.style.display = "block";
      messageBox.style.color = "#EF4444";
      messageBox.innerHTML = "Please enter a valid email address.";

      return;
    }

    // SUCCESS MESSAGE

    messageBox.style.display = "block";
    messageBox.style.color = "#22C55E";
    messageBox.innerHTML = 
      "Password reset link sent successfully!";

    // CLEAR FIELD

    email.value = "";

  });

</script>

</body>
</html>
