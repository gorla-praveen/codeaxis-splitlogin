<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password Flow</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --primary:#4F46E5;
      --primary-dark:#4338CA;
      --success:#22C55E;
      --danger:#EF4444;
      --bg:#F4F7FB;
      --text:#111827;
      --muted:#6B7280;
      --border:#E5E7EB;
      --shadow:0 12px 35px rgba(0,0,0,0.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(135deg,#EEF2FF,#F9FAFB);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .forgot-wrapper{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:24px;
      padding:45px 38px;
      box-shadow:var(--shadow);
    }

    .icon-box{
      width:85px;
      height:85px;
      margin:auto;
      border-radius:22px;
      background:rgba(79,70,229,0.12);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:25px;
    }

    .icon-box i{
      font-size:38px;
      color:var(--primary);
    }

    .title{
      text-align:center;
      font-size:34px;
      font-weight:700;
      color:var(--text);
      font-family:'Poppins',sans-serif;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
      margin-bottom:35px;
    }

    .form-label{
      font-weight:600;
      color:var(--text);
      margin-bottom:8px;
    }

    .form-control{
      height:56px;
      border-radius:14px;
      border:1px solid var(--border);
      padding-left:16px;
      font-size:15px;
      transition:0.3s;
    }

    .form-control:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(79,70,229,0.12);
    }

    .reset-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-weight:600;
      font-size:16px;
      margin-top:20px;
      transition:0.3s;
      box-shadow:0 8px 20px rgba(79,70,229,0.25);
    }

    .reset-btn:hover{
      background:var(--primary-dark);
      transform:translateY(-2px);
    }

    .message{
      display:none;
      margin-top:20px;
      text-align:center;
      font-weight:600;
      font-size:14px;
    }

    .step-box{
      display:none;
    }

    .back-login{
      text-align:center;
      margin-top:28px;
    }

    .back-login a{
      text-decoration:none;
      color:var(--primary);
      font-weight:600;
    }

    .success-icon{
      width:90px;
      height:90px;
      border-radius:50%;
      background:rgba(34,197,94,0.12);
      display:flex;
      justify-content:center;
      align-items:center;
      margin:auto;
      margin-bottom:20px;
    }

    .success-icon i{
      font-size:40px;
      color:var(--success);
    }

    @media(max-width:576px){

      .forgot-wrapper{
        padding:35px 22px;
      }

      .title{
        font-size:28px;
      }

    }

  </style>
</head>

<body>

<div class="forgot-wrapper">

  <!-- STEP 1 -->

  <div id="step1">

    <div class="icon-box">
      <i class="bi bi-envelope-paper"></i>
    </div>

    <h1 class="title">Forgot Password?</h1>

    <p class="subtitle">
      Enter your registered email address to receive an OTP.
    </p>

    <div class="mb-3">

      <label class="form-label">
        Email Address
      </label>

      <input
        type="email"
        class="form-control"
        id="email"
        placeholder="Enter your email"
      >

    </div>

    <button class="reset-btn" id="sendOtpBtn">
      Send OTP
    </button>

  </div>

  <!-- STEP 2 -->

  <div id="step2" class="step-box">

    <div class="icon-box">
      <i class="bi bi-shield-lock"></i>
    </div>

    <h1 class="title">Verify OTP</h1>

    <p class="subtitle">
      Enter the OTP sent to your email address.
    </p>

    <div class="mb-3">

      <label class="form-label">
        OTP
      </label>

      <input
        type="text"
        class="form-control"
        id="otp"
        placeholder="Enter OTP"
      >

    </div>

    <button class="reset-btn" id="verifyOtpBtn">
      Verify OTP
    </button>

  </div>

  <!-- STEP 3 -->

  <div id="step3" class="step-box">

    <div class="icon-box">
      <i class="bi bi-key"></i>
    </div>

    <h1 class="title">Reset Password</h1>

    <p class="subtitle">
      Create a new secure password.
    </p>

    <div class="mb-3">

      <label class="form-label">
        New Password
      </label>

      <input
        type="password"
        class="form-control"
        id="newPassword"
        placeholder="Enter new password"
      >

    </div>

    <div class="mb-3">

      <label class="form-label">
        Confirm Password
      </label>

      <input
        type="password"
        class="form-control"
        id="confirmPassword"
        placeholder="Confirm password"
      >

    </div>

    <button class="reset-btn" id="resetPasswordBtn">
      Reset Password
    </button>

  </div>

  <!-- STEP 4 -->

  <div id="step4" class="step-box">

    <div class="success-icon">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <h1 class="title">Success!</h1>

    <p class="subtitle">
      Your password has been reset successfully.
    </p>

   <a href="index.html" class="reset-btn d-flex align-items-center justify-content-center text-decoration-none">
  Back To Login
</a>

  </div>

  <!-- MESSAGE -->

  <div class="message" id="messageBox"></div>

  <!-- BACK -->

  <div class="back-login">
    <a href="password.html">
      <i class="bi bi-arrow-left"></i>
      Back to Login
    </a>
  </div>

</div>

<script>

  const step1 = document.getElementById("step1");
  const step2 = document.getElementById("step2");
  const step3 = document.getElementById("step3");
  const step4 = document.getElementById("step4");

  const sendOtpBtn = document.getElementById("sendOtpBtn");
  const verifyOtpBtn = document.getElementById("verifyOtpBtn");
  const resetPasswordBtn = document.getElementById("resetPasswordBtn");

  const messageBox = document.getElementById("messageBox");

  // DEMO OTP

  let generatedOtp = "1234";

  // SEND OTP

  sendOtpBtn.addEventListener("click", () => {

    const email = document.getElementById("email").value.trim();

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(!email.match(emailPattern)){

      showMessage("Please enter a valid email address.", "#EF4444");
      return;

    }

    showMessage("OTP sent successfully to your email.", "#22C55E");

    setTimeout(() => {

      step1.style.display = "none";
      step2.style.display = "block";

      hideMessage();

    }, 1000);

  });

  // VERIFY OTP

  verifyOtpBtn.addEventListener("click", () => {

    const otp = document.getElementById("otp").value.trim();

    if(otp !== generatedOtp){

      showMessage("Invalid OTP. Please try again.", "#EF4444");
      return;

    }

    showMessage("OTP verified successfully.", "#22C55E");

    setTimeout(() => {

      step2.style.display = "none";
      step3.style.display = "block";

      hideMessage();

    }, 1000);

  });

  // RESET PASSWORD

  resetPasswordBtn.addEventListener("click", () => {

    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if(newPassword.length < 8){

      showMessage("Password must be at least 8 characters.", "#EF4444");
      return;

    }

    if(newPassword !== confirmPassword){

      showMessage("Passwords do not match.", "#EF4444");
      return;

    }

    showMessage("Password reset successfully!", "#22C55E");

    setTimeout(() => {

      step3.style.display = "none";
      step4.style.display = "block";

      hideMessage();

    }, 1000);

  });

  // MESSAGE FUNCTION

  function showMessage(message,color){

    messageBox.style.display = "block";
    messageBox.style.color = color;
    messageBox.innerHTML = message;

  }

  function hideMessage(){

    messageBox.style.display = "none";

  }

</script>

</body>
</html>
